<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kuis Kimia Lengkap</title>
<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
    text-align: center;
}
.box {
    background: white;
    color: black;
    max-width: 700px;
    margin: 30px auto;
    padding: 20px;
    border-radius: 15px;
}
button {
    display:block;
    width:100%;
    margin:8px 0;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#3498db;
    color:white;
}
.correct{background:#2ecc71!important;}
.wrong{background:#e74c3c!important;}
.progress{height:10px;background:#ddd;border-radius:10px;}
.bar{height:10px;background:#2ecc71;width:0%;}
</style>
</head>

<body>

<h1>🧪 Kuis Kimia UTS (Full)</h1>

<div class="box">
<div class="progress"><div id="bar" class="bar"></div></div>

<h2 id="q"></h2>
<div id="a"></div>
<p id="exp"></p>
<p id="score"></p>

<button onclick="next()">Next</button>
</div>

<script>

let quiz = [

{q:"Reaksi redoks disebut transfer elektron karena?",a:["Ion berpindah","Elektron berpindah","Energi berubah","Suhu naik"],c:1,e:"Redoks = transfer elektron"},
{q:"Oksidasi adalah?",a:["Menerima e","Melepas e","Menerima proton","Melepas neutron"],c:1,e:"Oksidasi = kehilangan elektron"},
{q:"Reduksi adalah?",a:["Melepas e","Menerima e","Melepas proton","Menerima neutron"],c:1,e:"Reduksi = menerima elektron"},
{q:"Elektrolit kuat memiliki sifat?",a:["Tidak ionisasi","Ionisasi sempurna","Setengah ionisasi","Netral"],c:1,e:"Elektrolit kuat terionisasi penuh"},
{q:"Fungsi indikator titrasi?",a:["Ukur suhu","Titik akhir","Tambah reaksi","Hentikan reaksi"],c:1,e:"Menunjukkan titik ekuivalen"},
{q:"Buffer berfungsi?",a:["Naikkan pH","Jaga pH stabil","Turunkan suhu","Tambah ion"],c:1,e:"Menjaga pH stabil"},
{q:"Asam Bronsted-Lowry?",a:["Terima proton","Donor proton","Donor e","Terima e"],c:1,e:"Asam = donor H+"},
{q:"Basa Bronsted-Lowry?",a:["Terima proton","Donor proton","Donor e","Terima e"],c:0,e:"Basa = penerima H+"},
{q:"pH < 7?",a:["Basa","Netral","Asam","Garam"],c:2,e:"pH < 7 = asam"},
{q:"pH > 7?",a:["Asam","Basa","Netral","Ion"],c:1,e:"pH > 7 = basa"},
{q:"Energi aktivasi?",a:["Energi produk","Energi minimum","Energi total","Energi panas"],c:1,e:"Energi awal reaksi"},
{q:"Katalis?",a:["Mempercepat reaksi","Memperlambat","Menghentikan","Mengubah produk"],c:0,e:"Menurunkan energi aktivasi"},
{q:"Faktor laju reaksi?",a:["Warna","Suhu & konsentrasi","Volume","Bentuk"],c:1,e:"Suhu & konsentrasi utama"},
{q:"SN1 terjadi di?",a:["Non polar","Polar protik","Gas","Padat"],c:1,e:"Butuh stabilisasi karbokation"},
{q:"Konduktivitas listrik tinggi karena?",a:["Molekul","Ion bebas","Proton","Neutron"],c:1,e:"Ion bergerak menghantar listrik"},
{q:"ΔH dipengaruhi oleh?",a:["Warna","Tekanan & suhu","Volume","Cahaya"],c:1,e:"Kondisi lingkungan"},
{q:"Ikatan ion terbentuk karena?",a:["Berbagi e","Transfer e","Gaya lemah","Ikatan H"],c:1,e:"Transfer elektron"},
{q:"Ikatan kovalen?",a:["Transfer e","Berbagi e","Ionisasi","Difusi"],c:1,e:"Berbagi pasangan elektron"},
{q:"Larutan jenuh?",a:["Belum maksimal","Sudah maksimum","Kosong","Netral"],c:1,e:"Tidak bisa melarutkan lagi"},
{q:"Larutan homogen?",a:["Tidak seragam","Seragam","Padat","Gas"],c:1,e:"Komposisi sama"},
{q:"Hukum Boyle?",a:["P∝V","P∝1/V","V∝T","T tetap"],c:1,e:"Tekanan berbanding terbalik volume"},
{q:"Hukum Charles?",a:["P∝T","V∝T","T tetap","V tetap"],c:1,e:"Volume ∝ suhu"},
{q:"Mol adalah?",a:["Jumlah zat","Massa","Volume","Energi"],c:0,e:"Jumlah partikel"},
{q:"Avogadro?",a:["6.02x10^23","10^6","100","1"],c:0,e:"Jumlah partikel/mol"},
{q:"Gas ideal?",a:["Tidak nyata","Ikuti PV=nRT","Padat","Cair"],c:1,e:"Gas ideal mengikuti hukum ideal"},
{q:"Larutan asam kuat?",a:["Ionisasi penuh","Setengah","Tidak","Netral"],c:0,e:"Asam kuat terionisasi sempurna"},
{q:"Larutan basa kuat?",a:["Ionisasi penuh","Setengah","Tidak","Netral"],c:0,e:"Basa kuat terionisasi penuh"},
{q:"Reaksi endoterm?",a:["Lepas panas","Serap panas","Netral","Dingin"],c:1,e:"Menyerap energi"},
{q:"Reaksi eksoterm?",a:["Serap panas","Lepas panas","Netral","Tidak berubah"],c:1,e:"Mengeluarkan energi"},
{q:"Kesetimbangan kimia?",a:["Reaksi berhenti","Laju sama","Habis","Satu arah"],c:1,e:"Forward = reverse"},
{q:"pOH + pH =",a:["10","14","7","1"],c:1,e:"pH + pOH = 14"},
{q:"Logaritma pH?",a:["-log[H+]","log[OH]","[H+]","[OH-]"],c:0,e:"pH = -log[H+]"},
{q:"Sifat koligatif?",a:["Tergantung jenis","Jumlah partikel","Warna","Suhu"],c:1,e:"Jumlah partikel penting"},
{q:"Titik didih naik karena?",a:["Ion","Zat terlarut","Air","Gas"],c:1,e:"Kenaikan titik didih"},
{q:"Titik beku turun karena?",a:["Zat terlarut","Ion","Air","Gas"],c:0,e:"Penurunan titik beku"},
{q:"Difusi adalah?",a:["Perpindahan dari tinggi ke rendah","Sebaliknya","Tetap","Tidak bergerak"],c:0,e:"Gerak partikel"},
{q:"Osmosis?",a:["Air lewat membran","Ion lewat","Gas lewat","Energi"],c:0,e:"Air melewati membran semipermeabel"},
{q:"Korosi adalah?",a:["Reaksi redoks","Fisis","Biologi","Netral"],c:0,e:"Oksidasi logam"},
{q:"pH air laut?",a:["Asam","Basa","Netral","Tidak tentu"],c:1,e:"Sekitar 8 (basa lemah)"},
{q:"Salinitas mempengaruhi?",a:["Densitas","Warna","Energi","Gas"],c:0,e:"Salinitas ↑ densitas"},
{q:"Densitas air laut dipengaruhi?",a:["Suhu & salinitas","Warna","Cahaya","Tekanan saja"],c:0,e:"Dua faktor utama"},
{q:"Reaksi kimia laut penting untuk?",a:["Ekosistem","Warna","Udara","Tanah"],c:0,e:"Menentukan kehidupan laut"},
{q:"Ion utama air laut?",a:["Na+ Cl-","H2","O2","CO2"],c:0,e:"Dominan NaCl"},
{q:"Karbonat dalam laut?",a:["Buffer","Gas","Padat","Ion bebas"],c:0,e:"Sistem buffer laut"},
{q:"CO2 laut berfungsi?",a:["Buffer","Gas saja","Tidak penting","Padat"],c:0,e:"Sistem karbonat"},
{q:"Tekanan laut meningkat dengan?",a:["Kedalaman","Suhu","Warna","Angin"],c:0,e:"Semakin dalam semakin tinggi"},
{q:"Suhu laut mempengaruhi?",a:["Reaksi","Warna","Gas saja","Tidak"],c:0,e:"Suhu mempengaruhi reaksi"},
{q:"Arus laut mempengaruhi?",a:["Distribusi zat","Warna","Energi","Gas saja"],c:0,e:"Transport zat kimia"},
{q:"Fotosintesis laut?",a:["CO2 → O2","O2 → CO2","Netral","Gas saja"],c:0,e:"Menghasilkan oksigen"},
{q:"Respirasi laut?",a:["O2 → CO2","CO2 → O2","Netral","Gas"],c:0,e:"Menghasilkan CO2"}

];

let i=0,score=0;

function load(){
let q=quiz[i];
document.getElementById("q").innerText=q.q;
let html="";
q.a.forEach((x,idx)=>{
html+=`<button onclick="check(${idx})">${x}</button>`;
});
document.getElementById("a").innerHTML=html;
document.getElementById("exp").innerText="";
document.getElementById("score").innerText="Score: "+score;
document.getElementById("bar").style.width=(i/quiz.length*100)+"%";
}

function check(x){
let btn=document.querySelectorAll("#a button");
btn.forEach((b,idx)=>{
if(idx===quiz[i].c)b.classList.add("correct");
else if(idx===x)b.classList.add("wrong");
b.disabled=true;
});
if(x===quiz[i].c)score++;
document.getElementById("exp").innerText=quiz[i].e;
}

function next(){
i++;
if(i<quiz.length)load();
else{
document.querySelector(".box").innerHTML=
`<h2>🎉 Selesai!</h2><h3>Score: ${score}/${quiz.length}</h3>`;
}
}

load();

</script>
</body>
</html>
